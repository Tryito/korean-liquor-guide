<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>日本国内流通酒類キャプション</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; }
  .header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(26,26,26,0.95);
    backdrop-filter: blur(8px);
    padding: 12px 16px;
    display: flex; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .back {
    text-decoration: none; color: #c5b99a;
    font-size: 0.85rem; font-family: 'Noto Serif JP', serif;
  }
  .header-title {
    flex: 1; text-align: center;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem; color: #f7f3ed;
    font-weight: 600; padding-right: 40px;
  }
  .gallery {
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    padding: 8px 0;
  }
  .gallery img {
    width: 100%; max-width: 960px;
    display: block;
  }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back">← 戻る</a>
  <div class="header-title">日本国内流通酒類</div>
</div>
<div class="gallery">
  <img src="images/card_A01.png" alt="A-① 地平生マッコリ" loading="lazy">
  <img src="images/card_A02.png" alt="A-② ソウル長寿生マッコリ" loading="lazy">
  <img src="images/card_A03.png" alt="A-③ ソウル月梅マッコリ" loading="lazy">
  <img src="images/card_A04.png" alt="A-④ 二東にっこりマッコリ" loading="lazy">
  <img src="images/card_A05.png" alt="A-⑤ 琥濁酒" loading="lazy">
  <img src="images/card_A06.png" alt="A-⑥ 楊州黒豆マッコリ" loading="lazy">
  <img src="images/card_A07.png" alt="A-⑦ 純生マッコリ" loading="lazy">
  <img src="images/card_A08.png" alt="A-⑧ 釜山生マッコリ" loading="lazy">
  <img src="images/card_A09.png" alt="A-⑨ CANMAK" loading="lazy">
  <img src="images/card_A10.png" alt="A-⑩ 麹醉堂生マッコリ" loading="lazy">
  <img src="images/card_A11.png" alt="A-⑪ しゅわっと栗・とうもろこしマッコリ" loading="lazy">
  <img src="images/card_A12.png" alt="A-⑫ 眞露ラインナップ" loading="lazy">
</div>
</body>
</html>
