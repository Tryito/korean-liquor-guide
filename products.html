<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日本国内流通酒類キャプション</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f7f3ed;
    min-height: 100dvh;
  }
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(247,243,237,0.95);
    backdrop-filter: blur(8px);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(139,90,43,0.15);
  }
  .back {
    text-decoration: none;
    color: #8b5a2b;
    font-size: 0.85rem;
    font-family: 'Noto Serif JP', serif;
  }
  .header-title {
    flex: 1;
    text-align: center;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem;
    color: #3a2a1a;
    font-weight: 600;
    padding-right: 40px;
  }
  .gallery {
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .gallery img {
    width: 100%;
    max-width: 600px;
    border-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: #8b7355;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back">← 戻る</a>
  <div class="header-title">日本国内流通酒類</div>
</div>

<div class="gallery" id="gallery">
  <p class="empty" id="empty">画像を準備中です。</p>
  <!-- 이미지 파일을 images/ 폴더에 넣고 아래에 추가 -->
  <!-- <img src="images/product1.jpg" alt="商品1"> -->
  <!-- <img src="images/product2.jpg" alt="商品2"> -->
</div>

</body>
</html>
