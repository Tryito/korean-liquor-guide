<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>日本国内流通酒類キャプション</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f3ed; }
  .header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(247,243,237,0.95);
    backdrop-filter: blur(8px);
    padding: 12px 16px;
    display: flex; align-items: center;
    border-bottom: 1px solid rgba(139,90,43,0.15);
  }
  .back {
    text-decoration: none; color: #8b5a2b;
    font-size: 0.85rem; font-family: 'Noto Serif JP', serif;
  }
  .header-title {
    flex: 1; text-align: center;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem; color: #3a2a1a;
    font-weight: 600; padding-right: 40px;
  }
  .gallery {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    padding: 8px 0;
  }
  .gallery img {
    width: 100%; max-width: 600px;
    display: block;
  }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back">← 戻る</a>
  <div class="header-title">日本国内流通酒類</div>
</div>
<div class="gallery">
  <img src="images/products_1.jpg" alt="A-1〜A-4" loading="lazy">
  <img src="images/products_2.jpg" alt="A-5〜A-8" loading="lazy">
  <img src="images/products_3.jpg" alt="A-9〜A-12" loading="lazy">
  <img src="images/products_4.jpg" alt="A-13〜A-15" loading="lazy">
</div>
</body>
</html>
