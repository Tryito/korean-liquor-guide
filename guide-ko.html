<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>韓国伝統酒ガイドブック（韓国語）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f7f3ed;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(247,243,237,0.95);
    backdrop-filter: blur(8px);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(139,90,43,0.15);
  }
  .back {
    text-decoration: none;
    color: #8b5a2b;
    font-size: 0.85rem;
    font-family: 'Noto Serif JP', serif;
  }
  .header-title {
    flex: 1;
    text-align: center;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem;
    color: #3a2a1a;
    font-weight: 600;
    padding-right: 40px;
  }
  .pdf-frame {
    flex: 1;
    width: 100%;
    border: none;
  }
  .fallback {
    padding: 40px 20px;
    text-align: center;
    font-family: sans-serif;
    color: #5a4a3a;
  }
  .fallback a {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 28px;
    background: #8b5a2b;
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    font-size: 0.9rem;
  }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap');
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back">← 戻る</a>
  <div class="header-title">ガイドブック（韓国語）</div>
</div>

<iframe class="pdf-frame" id="pdfViewer"></iframe>

<div class="fallback" id="fallback" style="display:none;">
  <p>PDFを表示できません。<br>下のボタンからダウンロードしてください。</p>
  <a href="pdf/guide-ko.pdf" download>PDFをダウンロード</a>
</div>

<script>
  const pdf = 'pdf/guide-ko.pdf';
  const viewer = document.getElementById('pdfViewer');
  const fallback = document.getElementById('fallback');

  // Try Google Docs viewer for mobile compatibility
  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

  if (isMobile) {
    // On mobile, use Google Docs viewer for better PDF rendering
    // For local/self-hosted, fallback to direct embed
    viewer.src = pdf;
    viewer.onerror = () => {
      viewer.style.display = 'none';
      fallback.style.display = 'block';
    };
  } else {
    viewer.src = pdf;
  }
</script>

</body>
</html>
